server:
  port: 8088

app:
  api:
    prefix: /api/v1

spring:
  application:
    name: oj-core

  # ==============================================================
  # 1. DATABASE (MySQL)
  # ==============================================================
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_LOCAL_PORT:3306}/${MYSQL_DATABASE:oj_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_ROOT_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ${MYSQL_HIKARI_POOL_NAME:OJ-Hikari-MySQL}
      maximum-pool-size: ${MYSQL_HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${MYSQL_HIKARI_MIN_IDLE:5}
      connection-timeout: ${MYSQL_HIKARI_CONNECTION_TIMEOUT:30000}

  # Cấu hình JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false

  # ==============================================================
  # 2. DATA NO-SQL (Redis & MongoDB)
  # ==============================================================
  data:
    # --- REDIS (Cache, Session, Leaderboard) ---
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_LOCAL_PORT:6379}
      password: ${REDIS_PASSWORD:}

    # --- MONGODB (Discussion, Comment) ---
    mongodb:
      # Format: mongodb://user:pass@host:port/database?authSource=admin
      uri: mongodb://${MONGO_INITDB_ROOT_USERNAME:root}:${MONGO_INITDB_ROOT_PASSWORD:root}@${MONGO_HOST:localhost}:${MONGO_LOCAL_PORT:27017}/oj_discussion_db?authSource=admin

  # ==============================================================
  # 3. MESSAGING (RabbitMQ) - Giao tiếp với Judge Worker
  # ==============================================================
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_NODE_PORT:5672}
    username: ${RABBITMQ_DEFAULT_USER:guest}
    password: ${RABBITMQ_DEFAULT_PASS:guest}

  # ==============================================================
  # 4. SECURITY & OAUTH2
  # ==============================================================
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID:your-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:your-github-client-secret}
            scope:
              - user:email
              - read:user

  # ==============================================================
  # 5. MAIL CONFIGURATION
  # Gửi email (xác nhận tài khoản, đặt lại mật khẩu, thông báo)
  # ==============================================================
  mail:
    from: ${MAIL_FROM}
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ==============================================================
# 6. CUSTOM CONFIG (MinIO) - Lưu file
# ==============================================================
minio:
  endpoint: http://${MINIO_HOST:localhost}:${MINIO_API_PORT:9000}
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
  bucket-name: ${MINIO_BUCKET_NAME:oj-data}
  paths:
    # Các thư mục con trong bucket để lưu trữ file

    # User
    user-avatars-dir: avatars
    # Problem
    problem-root: problems
    testcases-dir: testcases
    illustrations-dir: illustrations
    descriptions-dir: descriptions # Lưu file mô tả bài tập

# ==============================================================
# 7. Biến hệ thống OJ
# ==============================================================
oj:
  storage:
    minio:
      # Tên bucket, lấy từ biến môi trường, nếu không có thì mặc định là oj-testcases
      bucket-testcase: ${MINIO_BUCKET_TESTCASE:oj-testcases}
      # Các prefix đường dẫn
      prefix-problem: problems
      suffix-testcase: testcases